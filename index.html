<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIF Contigo Mayor</title>
    <link rel="stylesheet" href="style.css">
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
    <header class="header-main">
        <h1 class="app-title">DIF Contigo Mayor</h1>
        <img src="logo dif jalisco.jpg" alt="DIF Jalisco" class="img-logo">
    </header>

    <main class="app-container" id="menu-principal">
        <div class="servicio-control">
            <span class="label-servicio">ASISTENTE ACTIVO</span>
            <label class="switch">
                <input type="checkbox" id="check-servicio" checked>
                <span class="slider round"></span>
            </label>
        </div>

        <div class="bubble-wrapper">
            <button id="btn-acompanamiento" class="bubble bg-gris">
                <span>ACOMPAÑAR</span>
            </button>
            <p class="label">Día a día</p>
        </div>

        <div class="bubble-wrapper">
            <button id="btn-asesoria" class="bubble bg-naranja">
                <span>ASESORÍA</span>
            </button>
            <p class="label">Asistencia Social</p>
        </div>

        <div class="bubble-wrapper">
            <button id="btn-sos" class="bubble bg-rojo">
                <span>EMERGENCIA</span>
            </button>
            <p class="label">Ayuda Inmediata</p>
        </div>
    </main>

    <div id="panel-acompanar" class="sub-panel" style="display: none;">
        <h2 class="label">Tu Asistente</h2>
        <div class="chat-display">
            <p id="texto-asistente">¿Qué quieres que recuerde por ti hoy?</p>
        </div>
        <button id="btn-hablar-asistente" class="btn-microfono">
            <span>HABLAR</span>
        </button>
        <button class="btn-volver" onclick="cerrarPaneles()">VOLVER</button>
    </div>

    <div id="panel-asesoria" class="sub-panel" style="display: none;">
        <h2 class="label">¿En qué te apoyamos?</h2>
        <button class="btn-opcion" onclick="hablar('Consultando temas de salud')">SALUD</button>
        <button class="btn-opcion" onclick="hablar('Consultando trámites de transporte')">TRANSPORTE</button>
        <button class="btn-opcion" onclick="hablar('Consultando otros apoyos')">TRÁMITES</button>
        <button class="btn-volver" onclick="cerrarPaneles()">VOLVER</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
