<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIF Contigo Mayor</title>
    <link rel="stylesheet" href="style.css">
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
    <header class="header-main">
        <h1 class="app-title">DIF Contigo Mayor</h1>
        <img src="logo dif jalisco.jpg" alt="DIF Jalisco" class="img-logo">
    </header>

    <main class="app-container">
        <div class="bubble-wrapper">
            <button id="btn-acompanamiento" class="bubble bg-gris">
                <span>ACOMPAÑAMIENTO</span>
            </button>
            <p class="label">Día a día</p>
        </div>

        <div class="bubble-wrapper">
            <button id="btn-asesoria" class="bubble bg-naranja">
                <span>ASESORÍA</span>
            </button>
            <p class="label">Asistencia Social</p>
        </div>

        <div class="bubble-wrapper">
            <button id="btn-sos" class="bubble bg-rojo">
                <span>EMERGENCIA</span>
            </button>
            <p class="label">Ayuda Inmediata</p>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
