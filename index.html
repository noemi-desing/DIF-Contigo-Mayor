<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>DIF Contigo Mayor</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            background-color: #f0f2f5;
        }
        .grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            grid-template-rows: 1fr 1fr; 
            gap: 15px; 
            padding: 15px; 
            flex-grow: 1; 
        }
        .card { 
            border: none; 
            border-radius: 25px; 
            color: white; 
            font-size: 2rem; 
            font-weight: bold; 
            cursor: pointer; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: transform 0.1s;
        }
        .card:active { transform: scale(0.95); }
        .rojo { background: #e63946; } 
        .azul { background: #004a99; } 
        .verde { background: #2a9d8f; } 
        .amarillo { background: #e9c46a; color: #333; }
        .mic-section { 
            padding: 30px; 
            text-align: center; 
            background: white; 
            border-top-left-radius: 30px;
            border-top-right-radius: 30px;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.1);
        }
        .mic-icon { font-size: 1.5rem; color: #004a99; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div class="grid">
        <button class="card rojo">🆘 EMERGENCIA</button>
        <button class="card azul">💊 MEDICINAS</button>
        <button class="card verde">📋 APOYOS DIF</button>
        <button class="card amarillo">👨‍👩‍👧‍👦 FAMILIA</button>
    </div>
    <div class="mic-section">
        <div class="mic-icon">🎤 "Hola, te escucho..."</div>
    </div>
</body>
</html>
