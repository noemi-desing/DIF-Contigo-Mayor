<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>DIF Contigo Mayor - Inicio</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f7f6; display: flex; flex-direction: column; height: 100vh; }
        .header { background: #004a99; color: white; padding: 15px; text-align: center; font-weight: bold; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; flex-grow: 1; }
        .btn { border: none; border-radius: 20px; color: white; font-size: 1.8rem; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; text-align: center; padding: 20px; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        .emergencia { background: #d90429; grid-column: span 2; }
        .tramites { background: #2a9d8f; }
        .rutas { background: #f4a261; }
        .salud { background: #457b9d; }
        .familia { background: #e9c46a; color: #333; }
        .footer { background: white; padding: 20px; border-top: 2px solid #004a99; display: flex; flex-direction: column; align-items: center; }
        .upload-section { margin-top: 10px; font-size: 1rem; color: #666; }
        .mic-btn { background: #004a99; color: white; border-radius: 50%; width: 60px; height: 60px; border: none; font-size: 1.5rem; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="header">DIF CONTIGO MAYOR - JALISCO</div>
    <div class="grid">
        <button class="btn emergencia">🆘 AYUDA URGENTE</button>
        <button class="btn tramites">📑 TRÁMITES (INAPAM/PASAJES)</button>
        <button class="btn rutas">📍 RUTAS SEGURAS</button>
        <button class="btn salud">💊 MIS MEDICINAS</button>
        <button class="btn familia">📞 MI FAMILIA</button>
    </div>
    <div class="footer">
        <button class="mic-btn">🎤</button>
        <div>"Hola, ¿en qué trámite o apoyo te ayudo hoy?"</div>
        <div class="upload-section">
            <label for="curp-upload">📁 Subir CURP para validación:</label>
            <input type="file" id="curp-upload" accept=".pdf,.jpg,.png">
        </div>
    </div>
</body>
</html>
