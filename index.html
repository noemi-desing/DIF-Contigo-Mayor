<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DIF Contigo Mayor - Sistema Integral</title>
    <link rel="stylesheet" href="style.css">
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
    <header class="header-main">
        <h1 class="app-title">DIF Contigo Mayor</h1>
        <img src="logo dif jalisco.jpg" alt="DIF Jalisco" class="img-logo">
    </header>

    <main class="app-container" id="menu-principal">
        <div class="bubble-wrapper">
            <button id="btn-acompanamiento" class="bubble bg-gris"><span>ACOMPAÑAR</span></button>
            <p class="label">Día a día</p>
        </div>
        <div class="bubble-wrapper">
            <button id="btn-asesoria" class="bubble bg-naranja"><span>TRÁMITES</span></button>
            <p class="label">Asistencia Social</p>
        </div>
        <div class="bubble-wrapper">
            <button id="btn-sos" class="bubble bg-rojo"><span>EMERGENCIA</span></button>
            <p class="label">Ayuda Inmediata</p>
        </div>
    </main>

    <div id="panel-asesoria" class="sub-panel" style="display: none;">
        <h2 class="label-gris">Identificación Digital PUB</h2>
        <div class="card">
            <div id="pub-status" class="status-box">Estado: Pendiente de Registro</div>
            <div id="qrcode"></div>
        </div>
        <div class="grid-buttons">
            <button class="btn-opcion" onclick="escanearDocumentos()">ESCANEAR INE/CURP</button>
            <button class="btn-opcion" onclick="firmarVozBiometrica()">FIRMA POR VOZ</button>
            <button class="btn-opcion" onclick="exportarExcelDIF()">DESCARGAR EXCEL (DIF)</button>
        </div>
        <button class="btn-volver" onclick="cerrarPaneles()">VOLVER</button>
    </div>

    <div id="panel-acompanar" class="sub-panel" style="display: none;">
        <h2 class="label-gris">Asistente de Vida</h2>
        <div class="chat-display">
            <div id="clima-widget">Cargando clima de Jalisco...</div>
            <p id="txt-asistente">¿Tienes planes para salir hoy?</p>
        </div>
        <button id="btn-microfono-asistente" class="btn-microfono">HABLAR</button>
        <button class="btn-volver" onclick="cerrarPaneles()">VOLVER</button>
    </div>

    <div id="panel-sos" class="sub-panel" style="display: none;">
        <h2 class="label-rojo">Círculo de Confianza</h2>
        <div class="card emergency-list">
            <p id="sos-instruccion">Dime quién es tu contacto para mandados o emergencias.</p>
            <ul id="lista-contactos"></ul>
        </div>
        <div class="grid-buttons">
            <button class="btn-opcion" onclick="sincronizarContactos()">SINCRONIZAR CONTACTOS</button>
            <button class="btn-opcion bg-rojo" onclick="dispararAlertaManual()">¡AUXILIO!</button>
        </div>
        <button class="btn-volver" onclick="cerrarPaneles()">VOLVER</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
