<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIF Contigo Mayor</title>
    <link rel="stylesheet" href="style.css">
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
    <header class="header-minimal">
        <img src="logo_dif.png" alt="DIF Jalisco" class="logo-top">
    </header>

    <main class="container-circular">
        <div class="btn-wrapper">
            <button id="btn-acompanamiento" class="circle-btn">
                ACOMPAÑAMIENTO
            </button>
            <span class="btn-label">Día a día</span>
        </div>

        <div class="btn-wrapper">
            <button id="btn-asesoria" class="circle-btn">
                ASESORÍA
            </button>
            <span class="btn-label">Asistencia Social</span>
        </div>

        <div class="btn-wrapper">
            <button id="btn-sos" class="circle-btn btn-danger">
                EMERGENCIA
            </button>
            <span class="btn-label">Ayuda Inmediata</span>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
